<header>
    <!-- TOP BAR -->
    <div class="header">
        <img src="assets/Logo.png" class="logo">
    </div>
</header>
<main>
    <div class="page">
        <!-- FORM CONTAINER -->
        <h1>Create your account</h1>

        <div class="container">


            <div class="form-box">

                <form [formGroup]="form_resgiter_user" (ngSubmit)="onSumit()">

                    <div class="form-grid">

                        <div class="form-group">
                            <label for="nombre">Full name:</label>
                            <input formControlName="txtnombre" type="text" id="nombre" class="form-control" placeholder="Michael Carlyle Hall">
                        </div>

                        <div class="email-group">
                            <label for="email">Email:</label>
                            <input formControlName="txtemail" type="email" id="email" class="form-control" placeholder="michaelhall@gmail.com">
                        </div>

                        <div class="form-group">
                            <label for="pass">Password:</label>
                            <input formControlName="txtpass" type="password" class="form-control" id="pass" placeholder="(8-16 characters)">
                        </div>

                        <!-- <div class="form-group">
                            <label for="">Confirm Password:</label>
                            <input type="password" placeholder="(8-16 characters)">
                        </div> -->

                    </div>

                    <!-- <div class="form-group">
                        <label for="rol">rol:</label>
                        <input formControlName="txtrol" type="text" id="rol" placeholder="MichaelCHall">
                    </div> -->

                    <div class="d-flex justify-content-center">
                        <button class="register-btn" type="submit">
                            Register
                        </button>
                        <button class="register-btn" routerLink="/login">
                            Return
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</main>
